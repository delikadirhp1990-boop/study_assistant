name: okuyombenya
description: "EPUB, PDF, Word, Excel, PowerPoint okuyucu"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3
  path_provider: ^2.1.5
  path: ^1.9.0
  file_picker: ^10.3.10
  permission_handler: ^11.3.1
  epub_pro: ^5.6.0
  syncfusion_flutter_pdfviewer: ^33.2.13
  pdfx: ^2.9.2
  image: ^4.2.0
  flutter_cache_manager: ^3.3.1
  adaptive_theme: ^3.6.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  intl: ^0.20.2
  uuid: ^4.4.2
  device_info_plus: ^12.2.0
  shared_preferences: ^2.5.0
  open_filex: ^4.5.2
  webview_flutter: ^4.10.0
  docx_file_viewer: ^1.0.1        # ✅ Word için
  archive: ^4.0.7                 # ✅ ZIP işlemleri için

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/kadir.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "lib/assets/kadir.png"
  remove_alpha_ios: true
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - lib/assets/kadir.png